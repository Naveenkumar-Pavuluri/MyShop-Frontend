<div class="flex flex-wrap justify-center max-w-6xl gap-4 mx-auto">
    @for (product of wishlistService.wishlist; track $index) {
    <div class="flex flex-col flex-1 w-full p-3 shadow sm:w-1/2 md:w-1/3 lg:w-1/4">
        <app-product-card [product]="product" class="flex-1 w-full h-full"></app-product-card>
    </div>
    }@empty{
    <div class="flex items-center justify-center w-full h-64">
        <h4 class="text-lg text-center text-gray-500">No items to show in wishlist</h4>
    </div>
    }
</div>
