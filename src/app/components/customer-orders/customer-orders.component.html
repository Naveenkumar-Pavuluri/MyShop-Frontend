<div class="container max-w-3xl p-6 mx-auto">
    <h2 class="mb-4 text-2xl font-bold">My Orders list</h2>
    @for(order of orders; track $index){
    <div>
        <h6>OrderId : {{order._id}}</h6>
        <span>Date : {{order.date | date:'mediumDate'}}</span>
        <p>Order Status : {{order.status}}</p>
    </div>
    <div *ngFor="let item of order.items; let i = index"
        class="flex items-center justify-between p-4 mb-4 bg-white rounded-lg shadow-md">
        <div class="flex items-center gap-4">
            <img [src]="item.product.images[0]" alt="{{ item.product.name }}"
                class="object-cover w-16 h-16 rounded-lg" />
            <div>
                <h6>{{item.product.name}}</h6>
                <p class="text-gray-500">₹{{sellingPrice(item.product.price,item.product.discount) * item.quantity}}
                </p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="font-small"> Quantity:</span>
            <span class="font-medium">{{item.quantity}}</span>
        </div>
    </div>
    }
</div>
